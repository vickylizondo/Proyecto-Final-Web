<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Interactivo</title>

<link rel="stylesheet" href="../css/estilos.css">

<style>

.terminal-map{
max-width:900px;
margin:30px auto;
background:#0F172A;
padding:20px;
border-radius:15px;
}

svg{
width:100%;
height:auto;
}

.zone{
fill:#1E3A5F;
stroke:#475569;
stroke-width:2;
cursor:pointer;
transition:.3s;
}

.zone:hover{
fill:#2563EB;
}

.zone.active{
fill:#2563EB;
stroke:#ffffff;
stroke-width:4;
}

.label{
fill:white;
font-size:12px;
text-anchor:middle;
font-family:Arial;
pointer-events:none;
}

#info-panel{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.boton-sector{
background:#2563EB;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-size:14px;
font-weight:bold;
transition:0.3s;
}

.boton-sector:hover{
background:#1d4ed8;
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(37,99,235,.30);
}

.tarjetas{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:30px;
}

</style>
</head>

<body>

<header>
<h1>Mapa de la Terminal</h1>
<p>Seleccione un sector del plano</p>
</header>

<img
src="../img/terminal.jpg"
alt="Mapa de la Terminal"
class="hero">

<main>

<div class="tarjetas">

<button class="boton-sector" onclick="seleccionarSector('Acceso Principal')">Acceso Principal</button>

<button class="boton-sector" onclick="seleccionarSector('Oficina de Información')">Información</button>

<button class="boton-sector" onclick="seleccionarSector('Locales Gastronómicos')">Gastronomía</button>

<button class="boton-sector" onclick="seleccionarSector('Baños Sector A')">Baño A</button>

<button class="boton-sector" onclick="seleccionarSector('Sala de Espera')">Sala de Espera</button>

<button class="boton-sector" onclick="seleccionarSector('Baños Sector B')">Baño B</button>

<button class="boton-sector" onclick="seleccionarSector('Andén 1')">Andén 1</button>

<button class="boton-sector" onclick="seleccionarSector('Andén 2')">Andén 2</button>

<button class="boton-sector" onclick="seleccionarSector('Andén 3')">Andén 3</button>

<button class="boton-sector" onclick="seleccionarSector('Estacionamiento')">Estacionamiento</button>

<button class="boton-sector" onclick="seleccionarSector('Punto de Atención Médica')">Médica</button>

<button class="boton-sector" onclick="seleccionarSector('Área de Carga para Celulares')">Carga</button>

</div>

<div class="terminal-map">

<svg viewBox="0 0 700 450">

<!-- Nombres de avenidas -->

<text x="350" y="15"
fill="white"
font-size="14"
font-weight="bold"
text-anchor="middle">
Av. Brígido Terán
</text>

<text x="350" y="440"
fill="white"
font-size="14"
font-weight="bold"
text-anchor="middle">
Av. Pedro Miguel Aráoz
</text>

<text x="20" y="225"
fill="white"
font-size="14"
font-weight="bold"
text-anchor="middle"
transform="rotate(-90 20 225)">
Av. Benjamín Aráoz
</text>

<text x="680" y="225"
fill="white"
font-size="14"
font-weight="bold"
text-anchor="middle"
transform="rotate(90 680 225)">
Av. Papa Francisco
</text>

<rect class="zone" data-name="Acceso Principal" x="280" y="20" width="140" height="45"></rect>
<text class="label" x="350" y="48">🚪 Acceso</text>

<rect class="zone" data-name="Oficina de Información" x="60" y="100" width="120" height="60"></rect>
<text class="label" x="120" y="135">ℹ️ Información</text>

<rect class="zone" data-name="Locales Gastronómicos" x="60" y="180" width="120" height="70"></rect>
<text class="label" x="120" y="220">🍔 Gastronomía</text>

<rect class="zone" data-name="Baños Sector A" x="60" y="270" width="120" height="55"></rect>
<text class="label" x="120" y="302">🚻 Baño A</text>

<rect class="zone" data-name="Sala de Espera" x="240" y="110" width="200" height="110"></rect>
<text class="label" x="340" y="170">🪑 Sala Espera</text>

<rect class="zone" data-name="Área de Carga para Celulares" x="500" y="110" width="120" height="50"></rect>
<text class="label" x="560" y="140">🔋 Carga</text>

<rect class="zone" data-name="Punto de Atención Médica" x="500" y="180" width="120" height="50"></rect>
<text class="label" x="560" y="210">🏥 Médica</text>

<rect class="zone" data-name="Baños Sector B" x="500" y="250" width="120" height="55"></rect>
<text class="label" x="560" y="282">🚻 Baño B</text>

<rect class="zone" data-name="Andén 1" x="220" y="260" width="110" height="70"></rect>
<text class="label" x="275" y="300">🚌 Andén 1</text>

<rect class="zone" data-name="Andén 2" x="360" y="260" width="110" height="70"></rect>
<text class="label" x="415" y="300">🚌 Andén 2</text>

<rect class="zone" data-name="Andén 3" x="500" y="330" width="120" height="55"></rect>
<text class="label" x="560" y="365">🚌 Andén 3</text>

<rect class="zone" data-name="Estacionamiento" x="220" y="350" width="250" height="40"></rect>
<text class="label" x="345" y="375">🅿️ Estacionamiento</text>

</svg>

</div>

<div id="info-panel">
<h3>📍 Ubicación en la Terminal</h3>
<p id="info-name">Seleccione un sector del plano.</p>
</div>

<br>

<a class="boton" href="index.html">
Volver al Inicio
</a>

</main>

<footer>
<p>© 2026 Nexo Consulting - Mapa de la Terminal</p>
</footer>

<script>

const zonas = document.querySelectorAll('.zone');
const info = document.getElementById('info-name');

zonas.forEach(zona => {

    zona.addEventListener('click', () => {

        zonas.forEach(z => z.classList.remove('active'));

        zona.classList.add('active');

        info.textContent = zona.dataset.name;

    });

});

function seleccionarSector(nombre){

    zonas.forEach(z => z.classList.remove('active'));

    const zona = Array.from(zonas).find(
        z => z.dataset.name === nombre
    );

    if(zona){

        zona.classList.add('active');

        info.textContent = nombre;

    }

}

</script>

</body>
</html>
